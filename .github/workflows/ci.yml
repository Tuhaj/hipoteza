name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Guard checks (dashes, secrets, infra ids)
        run: npm run check
      - name: Formatting
        run: npm run format:check
      - name: Tests
        run: npm test
